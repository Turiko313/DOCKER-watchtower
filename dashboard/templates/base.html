<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Watchtower Dashboard{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
    }
    .navbar {
      background-color: #161b22 !important;
      border-bottom: 1px solid #30363d;
    }
    .navbar-brand {
      font-weight: 700;
      color: #58a6ff !important;
    }
    .card {
      background-color: #161b22;
      border: 1px solid #30363d;
    }
    .card-header {
      background-color: #21262d;
      border-bottom: 1px solid #30363d;
      font-weight: 600;
    }
    .table {
      color: #c9d1d9;
    }
    .table-dark {
      --bs-table-bg: #161b22;
      --bs-table-striped-bg: #1c2128;
      --bs-table-hover-bg: #21262d;
      border-color: #30363d;
    }
    .badge-running {
      background-color: #238636;
    }
    .badge-stopped {
      background-color: #6e7681;
    }
    .badge-exited {
      background-color: #da3633;
    }
    .stat-card .display-6 {
      color: #58a6ff;
    }
    .log-box {
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.8rem;
      max-height: 340px;
      overflow-y: auto;
      padding: 0.75rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-box p {
      margin: 0;
      line-height: 1.5;
    }
    .btn-primary {
      background-color: #1f6feb;
      border-color: #1f6feb;
    }
    .btn-primary:hover {
      background-color: #388bfd;
      border-color: #388bfd;
    }
    .btn-outline-secondary {
      color: #8b949e;
      border-color: #30363d;
    }
    .btn-outline-secondary:hover {
      background-color: #21262d;
      color: #c9d1d9;
      border-color: #8b949e;
    }
    footer {
      border-top: 1px solid #30363d;
      color: #6e7681;
      font-size: 0.8rem;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        <i class="bi bi-eye-fill me-2"></i>Watchtower Dashboard
      </a>
      <div class="ms-auto">
        <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
        </a>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>

  <footer class="text-center py-3 mt-5">
    Watchtower Dashboard &mdash; {{ now if now is defined else "" }}
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
