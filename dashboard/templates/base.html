<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchtower Dashboard</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
    a{color:#58a6ff;text-decoration:none}
    a:hover{text-decoration:underline}
    /* Navbar */
    nav{background:#161b22;border-bottom:1px solid #30363d;padding:.75rem 1.5rem;display:flex;align-items:center;gap:2rem}
    nav .brand{font-size:1.2rem;font-weight:700;color:#58a6ff}
    nav .links{display:flex;gap:1.2rem}
    nav .links a{color:#8b949e;font-weight:500;padding:.25rem 0;border-bottom:2px solid transparent}
    nav .links a:hover,nav .links a.active{color:#c9d1d9;border-color:#58a6ff;text-decoration:none}
    nav .right{margin-left:auto}
    /* Content */
    .container{max-width:1100px;margin:1.5rem auto;padding:0 1.5rem}
    /* Flash messages */
    .flash{padding:.75rem 1rem;border-radius:6px;margin-bottom:1rem;border:1px solid}
    .flash.success{background:#0d1f0d;border-color:#238636;color:#3fb950}
    .flash.error{background:#1f0d0d;border-color:#da3633;color:#f85149}
    /* Cards */
    .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.25rem;margin-bottom:1rem}
    .card h2{font-size:1.1rem;margin-bottom:.75rem;color:#e6edf3}
    /* Tables */
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:.6rem .75rem;border-bottom:1px solid #21262d}
    th{color:#8b949e;font-weight:600;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px}
    /* Badges */
    .badge{display:inline-block;padding:.15rem .5rem;border-radius:12px;font-size:.8rem;font-weight:600}
    .badge.running{background:#0d1f0d;color:#3fb950;border:1px solid #238636}
    .badge.exited{background:#1f0d0d;color:#f85149;border:1px solid #da3633}
    .badge.paused{background:#1f1b0d;color:#d29922;border:1px solid #9e6a03}
    .badge.yes{background:#0d1f0d;color:#3fb950}.badge.no{background:#1f0d0d;color:#f85149}
    .badge.glow-green{box-shadow:0 0 8px 3px rgba(63,185,80,.5),0 0 16px 6px rgba(63,185,80,.2)}
    .badge.glow-red{box-shadow:0 0 8px 3px rgba(248,81,73,.5),0 0 16px 6px rgba(248,81,73,.2)}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    .group-header{cursor:pointer;background:#161b22}.group-header:hover{background:#1c2333}
    .group-child{background:#12161e}
    /* Buttons */
    .btn{display:inline-block;padding:.5rem 1rem;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:.9rem;font-weight:500}
    .btn:hover{background:#30363d;text-decoration:none}
    .btn-primary{background:#238636;border-color:#238636;color:#fff}
    .btn-primary:hover{background:#2ea043}
    .btn.filter-btn{padding:.3rem .75rem;font-size:.8rem}
    .btn.filter-btn.active{background:#238636;border-color:#238636;color:#fff}
    .btn-danger{background:#da3633;border-color:#da3633;color:#fff}
    .btn-danger:hover{background:#f85149}
    /* Forms */
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;margin-bottom:.35rem;font-weight:500;color:#8b949e;font-size:.9rem}
    .form-group input[type=text],.form-group input[type=password],.form-group input[type=number],.form-group select{
      width:100%;padding:.5rem .75rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.9rem}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:#58a6ff}
    .checkbox-group{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
    .checkbox-group input[type=checkbox]{width:16px;height:16px;accent-color:#238636}
    /* Metrics grid */
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1rem}
    .metric-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem;text-align:center}
    .metric-card .value{font-size:1.8rem;font-weight:700;color:#58a6ff}
    .metric-card .label{font-size:.8rem;color:#8b949e;margin-top:.25rem}
    /* Login */
    .login-box{max-width:380px;margin:8rem auto;padding:2rem;background:#161b22;border:1px solid #30363d;border-radius:8px}
    .login-box h1{text-align:center;margin-bottom:1.5rem;color:#e6edf3}
    .login-box .btn{width:100%;text-align:center}
  </style>
</head>
<body>
  {% if logged_in %}
  <nav>
    <span class="brand">Watchtower</span>
    <div class="links">
      <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint=='dashboard' }}">Dashboard</a>
      <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint=='settings' }}">Settings</a>
    </div>
    <div class="right">
      <a href="{{ url_for('logout') }}" class="btn">Logout</a>
    </div>
  </nav>
  {% endif %}
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
