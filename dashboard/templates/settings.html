{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Parametres Watchtower</h2>
  <p style="color:#8b949e;margin-bottom:1rem;font-size:.9rem">
    Les modifications sont sauvegardees et Watchtower est automatiquement redemarre.
  </p>
  <form method="POST">

    <div class="form-group">
      <label for="schedule">Planification cron (prioritaire sur l'intervalle)</label>
      <input type="text" id="schedule" name="schedule" value="{{ settings.schedule }}"
             placeholder="Ex: 0 0 4 * * * (tous les jours a 4h)">
    </div>

    <div class="form-group">
      <label for="poll_interval">Intervalle de verification (secondes)</label>
      <input type="number" id="poll_interval" name="poll_interval"
             value="{{ settings.poll_interval }}" min="60">
    </div>

    <div class="form-group">
      <label for="log_level">Niveau de log</label>
      <select id="log_level" name="log_level">
        {% for lvl in ['debug','info','warn','error','fatal','panic'] %}
        <option value="{{ lvl }}" {{ 'selected' if settings.log_level == lvl }}>{{ lvl }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="timeout">Timeout de mise a jour (secondes)</label>
      <input type="number" id="timeout" name="timeout" value="{{ settings.timeout }}" min="10">
    </div>

    <hr style="border-color:#30363d;margin:1.25rem 0">

    <div class="checkbox-group">
      <input type="checkbox" id="cleanup" name="cleanup" {{ 'checked' if settings.cleanup }}>
      <label for="cleanup">Supprimer les anciennes images apres mise a jour</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="include_stopped" name="include_stopped" {{ 'checked' if settings.include_stopped }}>
      <label for="include_stopped">Inclure les conteneurs arretes</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="revive_stopped" name="revive_stopped" {{ 'checked' if settings.revive_stopped }}>
      <label for="revive_stopped">Redemarrer les conteneurs arretes apres mise a jour</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="monitor_only" name="monitor_only" {{ 'checked' if settings.monitor_only }}>
      <label for="monitor_only">Mode surveillance uniquement (pas de mise a jour automatique)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="label_enable" name="label_enable" {{ 'checked' if settings.label_enable }}>
      <label for="label_enable">Surveiller uniquement les conteneurs avec le label watchtower</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="rolling_restart" name="rolling_restart" {{ 'checked' if settings.rolling_restart }}>
      <label for="rolling_restart">Redemarrage progressif (rolling restart)</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="no_startup_message" name="no_startup_message" {{ 'checked' if settings.no_startup_message }}>
      <label for="no_startup_message">Desactiver le message de demarrage</label>
    </div>

    <hr style="border-color:#30363d;margin:1.25rem 0">
    <h3 style="margin-bottom:.75rem">Notifications Discord</h3>

    <div class="checkbox-group">
      <input type="checkbox" id="notifications_discord" name="notifications_discord" {{ 'checked' if settings.notifications_discord }}>
      <label for="notifications_discord">Activer les notifications Discord</label>
    </div>

    <div class="form-group">
      <label for="discord_webhook_url">URL du Webhook Discord</label>
      <input type="text" id="discord_webhook_url" name="discord_webhook_url"
             value="{{ settings.discord_webhook_url }}"
             placeholder="https://discord.com/api/webhooks/XXXXXXX/XXXXXXX">
    </div>

    <hr style="border-color:#30363d;margin:1.25rem 0">

    <button type="submit" class="btn btn-primary">Sauvegarder et redemarrer</button>
  </form>
</div>

{% endblock %}
