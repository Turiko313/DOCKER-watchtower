services:
  watchtower-dashboard:
    image: ghcr.io/turiko313/watchtower-dashboard:latest
    container_name: watchtower-dashboard
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - watchtower_config:/config
      # Mount your compose stacks directory so the dashboard can detect down
      # services (OMV7 / automatic cleanup support).  Adjust the host path to
      # match the directory where OMV7 (or your compose plugin) stores stacks.
      # Example:  - /compose:/compose:ro
      - ${COMPOSE_STACKS_DIR:-/srv}:/srv:ro
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DOCKER_API_VERSION=1.40
      # Watchtower API
      - WATCHTOWER_HTTP_API_METRICS=true
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_API_TOKEN}
      # Dashboard
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      # GHCR private registry (optional)
      - GHCR_USERNAME=${GHCR_USERNAME:-}
      - GHCR_TOKEN=${GHCR_TOKEN:-}
      # Compose-file discovery: comma-separated paths inside the container to
      # scan for docker-compose YAML files (OMV7 down-stack detection).
      # Set to the same path you mounted above, e.g.: COMPOSE_DIRS=/compose
      - COMPOSE_DIRS=${COMPOSE_DIRS:-/srv}
    ports:
      - "8080:8080"
      - "${DASHBOARD_PORT:-8888}:5000"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  watchtower_config:
